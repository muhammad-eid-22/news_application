name: news_app
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.9.2
  flutter_bloc: ^9.1.1
  retrofit: ^4.9.2
  logger: ^2.6.0  # for logging purpose
  json_annotation: ^4.9.0
  http: ^1.6.0
  carousel_slider: ^5.1.2
  bounceable: ^1.0.0
  cached_network_image: ^3.4.1
  flutter_svg: ^2.2.4

dev_dependencies:
  build_runner: ^2.12.0
  retrofit_generator: ^10.0.1
  json_serializable: ^6.10.0
  flutter_gen_runner:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/elementor-placeholder-image.png
    - assets/icons/
flutter_gen:
  output: lib/core/gen/ # Optional (default: lib/gen/)
  # line_length: 80 # Optional

  # Optional
  integrations:
    image: true
    flutter_svg: true
    rive: true
    lottie: true
